commands:
  install: bun install
  dev: bun run dev
  build: bun run build
  test: bun run test
  typecheck: bun run typecheck
  lint: bun run lint

services:
  web:
    start: PORT=3000 bun run dev
    stop: lsof -ti :3000 | xargs kill
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []
